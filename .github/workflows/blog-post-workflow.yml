name: Latest blog posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with latest posts from puntobello.ch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.puntobello.ch/en/index.xml"
          max_post_count: 3
          template: "- [$title]($url) — $date"
          date_format: "mmm d, yyyy"
          commit_message: "chore: update latest blog posts"
